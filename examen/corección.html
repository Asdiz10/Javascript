    <style>
        div{
            width: 100px;

            border: solid 2px black;
        }

        .rojo{
            background-color: red;
        }

        .verde{

        .negro{

            color: white;
        }

<body>
    <h1>Examen JavaScript</h1>

    <input id="inpt" type="text">
    <button id="boton">PULSA</button>
    <div class="div1" id="divv"></div>



    <script>

        const input1 = document.querySelector("#inpt")
        const btn = document.querySelector("#boton")
        const miDiv = document.querySelector("#divv")

        function camBiar(){
            if(input1.value === "Rojo"){
                miDiv.innerHTML = "Es de color rojo"
                miDiv.classList.add("rojo")
                miDiv.classList.remove("verde")
                miDiv.classList.remove("negro")

            } else if(input1.value === "Verde"){
                miDiv.innerHTML = "Es de color verde"
                miDiv.classList.add("verde")
                miDiv.classList.remove("rojo")
                miDiv.classList.remove("negro")
            } else{
                miDiv.innerHTML = "No has elegido ningún color"
                miDiv.classList.add("negro")
                miDiv.classList.remove("rojo")
                miDiv.classList.remove("verde")
                
            }
        }
        btn.addEventListener("click", camBiar)

    </script>
</body>
