<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 1</title>
    <style>



        .div1{
            background-color: rgb(6, 255, 6);
            height: 100px;
            width: 100px;
        }

        .redd{
            background-color: red;
        }


        .green{
            background-color: green;
        }


        .yelloww{
            background-color: yellow;
        }
        

        .greenn{
            background-color: green;
        }
    </style>
</head>
<body>
    <h1>Ejercicio 1</h1>
    <input id="nom" type="text">
    <input id="cognom" type="text">
    <button id="boton">PULSA</button>

    <h2>Ejercicio 2</h2>
    <div id="contenido" class="div1"></div>
    <button class="redd" id="red">rojo</button>
    <button class="greenn" id="green">verde</button>
    <button class="yelloww" id="yellow">amarillo</button>
    
    <h2>Ejercicio 3</h2>
    <input type="number" name="" id="nota1" placeholder="nota1">

    <input type="number" name="" id="nota2" placeholder="nota2">

    <input type="number" name="" id="nota3" placeholder="nota3">

    <div class="divnmb"></div>
    <button id="cabtn">CALCULA</button>
    <!--EJERCICIO 3.-->


    <div id="divtxt"></div>



    <script>
        const nmb = document.querySelector("#nom")
        console.log(nmb)
        const apell = document.querySelector("#cognom")
        console.log(apell)
        const btn = document.querySelector("#boton")
        console.log(btn)

        function miDiv(){
            console.log("Buneos dias" + " " + nmb.value + " " + apell.value)

        }
        btn.addEventListener("click", miDiv)

        
        const rojo = document.querySelector("#red")
        console.log(rojo)
        const verde = document.querySelector("#green")
        console.log(verde)
        const amarillo = document.querySelector("#yellow")
        console.log(amarillo)
        const content = document.querySelector("#contenido")

        function camBiar(){
            content.classList.add("redd")
            content.classList.remove("yelloww")
            content.classList.remove("greenn")
            
            

        }
        rojo.addEventListener("click", camBiar)


        function verdee(){
            content.classList.add("greenn")
            content.classList.remove("yelloww")
            content.classList.remove("redd")
        }
        verde.addEventListener("click", verdee)


        function amaRillo(){
            content.classList.add("yelloww")
            content.classList.remove("redd")
            content.classList.remove("greenn")
        }
        amarillo.addEventListener("click", amaRillo)


        
        const div1 = document.querySelector(".divnmb")
        const caabtnn = document.querySelector("#cabtn")

        function media(){
            let nte1 = Number(document.querySelector("#nota1").value)
            console.log(nte1)
            let nte2 = Number(document.querySelector("#nota2").value)
            console.log(nte2)
            let nte3 = Number(document.querySelector("#nota3").value)
            console.log(nte3)

            div1.innerHTML = "tu media es:" + (nte1 + nte2 + nte3)/3;

            let div2 = document.querySelector("#divtxt")
            if(nte1 < 5 || nte2 < 5 || nte3 < 5){
                div2.innerHTML= "ESTAS SUSPENDIDO"

            } else{
                div2.innerHTML= "MUY BIEEEEN!!!!!!"
            }


        }
        caabtnn.addEventListener("click", media)



    </script>
</body>
</html>
