<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vectores</title>
  </head>
  <body>
    <h1>VECTORES</h1>







    <script>

    const frutas = ["plátano","naranja","manzana", "fresa"] //funionan con "[]"

    console.log(frutas)
    console.log("número de elementos", frutas.length) //Número de elementos que tiene un vector ".length"
    console.log(frutas[1]) //para ver el elemento que quieras, empieza siempre en "0"
    console.log(frutas[frutas.length-1]) //la posicion del último elemento menos "1" se hace así porque empieza siempre en "0"

    for(let i = 0; i < frutas.length ; i++){ // length, RECUERDA!!! TH 
        console.log(frutas[i])
    }
    









    const personas = [
        ["Carlos", "Sánchez"], // cada vector con su propio nombre
        ["Adam", "El Moussaoui"],
        ["David", "Garcia"]
    ] 
    
 
    for(let i=0; i < personas.length; i++){ // .length para que el bucle lea todos los elementos sin excepcion.
        console.log(personas[i][0]+ " " + personas[i][1])
    }




    const productos = [
      ["Teclado", 15]
      ["Ratón", 4]
      ["Monitor", 8]
    ]

    for(let i=0; i < productos.length; i++){
      console.log(productos[i][i])
    }





    </script>
  </body>
</html>
